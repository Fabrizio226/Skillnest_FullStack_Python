<!DOCTYPE html>
<html lang="es">

    <title>Nuevo Usuario</title>
</head>
<body>
        <div class="content" style="max-width: 500px; margin: auto;">

            <div class="btn-row"><button class="btn-main">Crear</button></div>
        </div>
    </div>
