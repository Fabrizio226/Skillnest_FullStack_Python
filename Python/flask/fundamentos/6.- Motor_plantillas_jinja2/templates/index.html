<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Motor de Plantillas</title>
</head>
<body>

    <header>
        <h1>Bienvenido, {{ nombre }}</h1>
        <p>Curso: {{ curso }}</p>
        <p>Ciudad: {{ ciudad }}</p>
        <p>Año: {{ anio }}</p>
    </header>

    <section>
        <h2>Tecnologías</h2>
        <ul>
            {% for tecnologia in tecnologias %}
                <li>{{ tecnologia }}</li>
            {% endfor %}
        </ul>
    </section>

</body>
</html>
